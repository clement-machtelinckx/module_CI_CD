name: Build Docker, Test Stack and Deploy React Application

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test-cypress-offline:
    name: Cypress offline tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.17.0 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cypress offline run
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm start
          wait-on: http://localhost:3000
          wait-on-timeout: 120
          config: baseUrl=http://localhost:3000
          spec: cypress/e2e/offline.cy.js
  build-docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest \
            -f DockerfileReact .

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Build backend Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
            -f backend/Dockerfile ./backend

      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

  test-docker:
    name: Test Docker Compose healthchecks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.17.0 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=ci_password
          MYSQL_DATABASE=ynov_ci
          MYSQL_USER=root
          EMAIL_ADMIN=loise.fenoll@ynov.com
          PASSWORD_ADMIN=PvdrTAzTeR247sDnAZBr
          ADMIN_PASSWORD_SALT=ci_salt_for_tests
          ADMIN_TOKEN_SECRET=ci_token_secret_for_tests
          EOF

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Clean Docker Compose state
        run: docker compose down -v --remove-orphans

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Show running containers
        run: docker compose ps

      - name: Check all containers health
        run: |
          check_health() {
            container_name=$1

            echo "Waiting for $container_name to become healthy..."

            for i in {1..60}; do
              health_status=$(docker inspect --format '{{json .State.Health.Status}}' "$container_name")

              echo "$container_name health status: $health_status"

              if echo "$health_status" | jq -e '. == "healthy"' > /dev/null; then
                echo "$container_name is healthy"
                return 0
              fi

              if echo "$health_status" | jq -e '. == "unhealthy"' > /dev/null; then
                echo "$container_name is unhealthy"
                docker logs "$container_name"
                exit 1
              fi

              sleep 5
            done

            echo "$container_name did not become healthy in time"
            docker logs "$container_name"
            exit 1
          }

          check_health migration_container
          check_health migration_adminer
          check_health migration_backend
          check_health migration_react

      - name: Smoke test services
        run: |
          docker compose ps
          docker logs migration_react --tail 100
          curl -I http://localhost:3000
          curl -s http://localhost:3000 | head -n 40
          curl -f http://localhost:8000/users
          curl -f http://localhost:8000/docs
          curl -f http://localhost:3000
          curl -f http://localhost:8080

      - name: Cypress online run
        uses: cypress-io/github-action@v6
        with:
          install: false
          wait-on: http://localhost:3000
          wait-on-timeout: 120
          config: baseUrl=http://localhost:3000
          spec: cypress/e2e/spec.cy.js,cypress/e2e/admin.cy.js

      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose logs --no-color
          docker logs migration_react --tail 200
          docker logs migration_backend --tail 200

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v --remove-orphans

  test-react:
    name: Test and build React application
    runs-on: ubuntu-latest
    needs: test-docker

    strategy:
      matrix:
        node-version:
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Use npm 11
        run: npm install -g npm@11.17.0 --no-audit --no-fund

      - name: Install React dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate JSDoc documentation
        run: npm run jsdoc

      - name: Run React tests
        run: npm test

      - name: Build React application
        run: npm run build --if-present

      - name: Setup GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - build-docker
      - test-docker
      - test-react

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend-vercel:
    name: Deploy backend to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - test-cypress-offline
      - test-docker
      - test-react

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build Vercel project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel project
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
