name: Build Docker, Test Stack and Deploy React Application

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest \
            -f DockerfileReact .

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Build backend Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
            -f backend/Dockerfile ./backend

      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

  test-docker:
    name: Test Docker Compose healthchecks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=ci_password
          MYSQL_DATABASE=ynov_ci
          MYSQL_USER=root
          EMAIL_ADMIN=loise.fenoll@ynov.com
          PASSWORD_ADMIN=PvdrTAzTeR247sDnAZBr
          ADMIN_PASSWORD_SALT=ci_salt_for_tests
          ADMIN_TOKEN_SECRET=ci_token_secret_for_tests
          EOF

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Check all containers health
        run: |
          check_health() {
            container_name=$1

            echo "Waiting for $container_name to become healthy..."

            for i in {1..60}; do
              health_status=$(docker inspect --format '{{json .State.Health.Status}}' "$container_name")

              echo "$container_name health status: $health_status"

              if echo "$health_status" | jq -e '. == "healthy"' > /dev/null; then
                echo "$container_name is healthy"
                return 0
              fi

              if echo "$health_status" | jq -e '. == "unhealthy"' > /dev/null; then
                echo "$container_name is unhealthy"
                docker logs "$container_name"
                exit 1
              fi

              sleep 5
            done

            echo "$container_name did not become healthy in time"
            docker logs "$container_name"
            exit 1
          }

          check_health migration_container
          check_health migration_adminer
          check_health migration_backend
          check_health migration_react

      - name: Smoke test services
        run: |
          curl -f http://localhost:8000/users
          curl -f http://localhost:8000/docs
          curl -f http://localhost:3000
          curl -f http://localhost:8080

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v

  test-react:
    name: Test and build React application
    runs-on: ubuntu-latest
    needs: test-docker

    strategy:
      matrix:
        node-version:
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install React dependencies
        run: npm install

      - name: Generate JSDoc documentation
        run: npm run jsdoc

      - name: Run React tests
        run: npm test

      - name: Build React application
        run: npm run build --if-present

      - name: Setup GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - build-docker
      - test-docker
      - test-react

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
