services:
  db:
    image: mysql:9.7
    container_name: migration_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      EMAIL_ADMIN: ${EMAIL_ADMIN}
      PASSWORD_ADMIN: ${PASSWORD_ADMIN}
      ADMIN_PASSWORD_SALT: ${ADMIN_PASSWORD_SALT}
    ports:
      - "3306:3306"
    volumes:
      - migration_mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - migration_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  adminer:
    image: adminer
    container_name: migration_adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - migration_network
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8080/\") === false ? 1 : 0);'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: migration_backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PORT: 3306
      ADMIN_PASSWORD_SALT: ${ADMIN_PASSWORD_SALT}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - migration_network
    command: uvicorn main:app --proxy-headers --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/users', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  react:
    build:
      context: .
      dockerfile: DockerfileReact
    container_name: migration_react
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_SERVER_PORT: 8000
      REACT_APP_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - migration_network
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  migration_mysql_data:

networks:
  migration_network:
    driver: bridge
